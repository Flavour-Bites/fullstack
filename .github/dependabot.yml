version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Africa/Addis_Ababa
    open-pull-requests-limit: 10
    reviewers: []
    labels:
      - dependencies
      - automated
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "deps"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - automated
      - github-actions
    commit-message:
      prefix: "ci"
